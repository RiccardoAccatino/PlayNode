# =========================================================================
# Come provarlo (Rimanendo sempre nella cartella radice 'PlayNode'):
#
# Pulisci tutto:
# docker-compose --env-file .env -f docker/docker-compose.yml down -v
#
# Avvia con il .env corretto:
# docker-compose --env-file .env -f docker/docker-compose.yml up -d
# =========================================================================

# version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    container_name: playnode_postgres
    env_file:
      - ../.env
    ports:
      - "5435:5432"
    volumes:
      # Mappa init.sql e gli assegna il prefisso 01 (parte per primo)
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      # Mappa populate.sql e gli assegna il prefisso 02 (parte subito dopo)
      - ./postgres/populate.sql:/docker-entrypoint-initdb.d/02-populate.sql
      - playnode_db_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: playnode-mosquitto
    env_file:
      - ../.env
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

volumes:
  playnode_db_data:
