spring.application.name=game-service

# Configurazione del Database PostgreSQL
# NOTA: Usiamo la porta 5433 perchķ Ķ quella che hai mappato nel docker-compose.yml
spring.datasource.url=jdbc:postgresql://localhost:5433/PlayNode_db
spring.datasource.username=admin
spring.datasource.password=admin

# Permette a Spring di non cancellare le tabelle (usiamo none perchķ hai giÓ il DDL in init.sql)
spring.jpa.hibernate.ddl-auto=none

# Mostra le query SQL nel terminale (utile per imparare ed eseguire il debug!)
spring.jpa.show-sql=true

# Questa riga aiuta a mappare correttamente i tipi di dati tra Java e PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect