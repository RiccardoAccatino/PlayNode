spring.application.name=game-service

# Configurazione del Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/nome_del_tuo_database
spring.datasource.username=tuo_username
spring.datasource.password=tua_password

# Permette a Spring di non cancellare le tabelle (usiamo validate o none perché hai già il DDL)
spring.jpa.hibernate.ddl-auto=none
# Mostra le query SQL nel terminale (utile per imparare ed eseguire il debug!)
spring.jpa.show-sql=true