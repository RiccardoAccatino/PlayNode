spring.application.name=auth-service

# 1. Importa le variabili d'ambiente dal file .env
# Nota: Usiamo ../../../ perché siamo in una cartella più profonda nel branch feature
spring.config.import=optional:file:../../../docker/.env

# 2. Connessione al Database (utilizza le variabili definite nel .env)
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Comportamento Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# 4. Configurazione Swagger UI (fondamentale per la documentazione)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs



