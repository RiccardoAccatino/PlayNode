# Per farlo funzionare da Intellij bisogna configurare prima le variabili d'ambiente di ogni microservizio:
#   Edit Configuration... -> Modify options -> Environment variable

spring.application.name=auth-service
server.port=8081

spring.config.import=optional:file:./docker/.env,optional:file:../../docker/.env

spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===== JWT CONFIGURATION =====
# Secret key per firmare i JWT token (almeno 256 bit)
jwt.secret=${JWT_SECRET}

# Tempo di scadenza del token in millisecondi
wt.expiration=${JWT_EXPIRATION}

# ===== CORS CONFIGURATION =====
# Origins consentiti (da SecurityConfig)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
